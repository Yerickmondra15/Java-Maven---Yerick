<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cinta - Videoclub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1>🎬 Videoclub Management System</h1>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/cintas">Cintas</a></li>
                <li><a href="/cintas/nuevo" class="btn-nuevo">+ Nueva Cinta</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="formulario-section">
            <h2 th:if="${cinta.codigoCinta == null}">📝 Nueva Cinta</h2>
            <h2 th:if="${cinta.codigoCinta != null}">✏️ Editar Cinta</h2>

            <form th:action="@{/cintas/guardar}" th:object="${cinta}" method="post" class="formulario">
                
                <div class="form-group">
                    <label for="codigoCinta">Código de Cinta:</label>
                    <input type="number" id="codigoCinta" th:field="*{codigoCinta}" 
                           th:disabled="${cinta.codigoCinta != null}" required>
                </div>

                <div class="form-group">
                    <label for="titulo">Título:</label>
                    <input type="text" id="titulo" th:field="*{titulo}" required>
                </div>

                <div class="form-group">
                    <label for="director">Director:</label>
                    <input type="text" id="director" th:field="*{director}" required>
                </div>

                <div class="form-group">
                    <label for="año">Año:</label>
                    <input type="number" id="año" th:field="*{año}" required>
                </div>

                <div class="form-group">
                    <label for="genero">Género:</label>
                    <input type="text" id="genero" th:field="*{genero}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="estanteria">Estantería:</label>
                        <input type="text" id="estanteria" th:field="*{estanteria}" required>
                    </div>

                    <div class="form-group">
                        <label for="estante">Estante:</label>
                        <input type="text" id="estante" th:field="*{estante}" required>
                    </div>

                    <div class="form-group">
                        <label for="fila">Fila:</label>
                        <input type="text" id="fila" th:field="*{fila}" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-submit">💾 Guardar</button>
                    <a href="/cintas" class="btn btn-cancel">❌ Cancelar</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Videoclub Management System | Spring Boot + Thymeleaf + Oracle</p>
    </footer>
</body>
</html>
